<!doctype html>
<html>

<head>
    {% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}{% endblock %} - T-Sync</title>
    {% endblock %}
</head>

<body>
    <header>
        <div class="container header-inner">
            <a href="/" class="nav-logo">
                <span class="logo-icon">T</span>
                <span>T-Sync</span>
            </a>
            <nav>
                <a class="nav-link" href="/resources">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Resources
                </a>
                <a class="nav-link" href="/tampermonkey">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                    Script
                </a>
                <a class="nav-link" href="/account">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Account
                </a>
                <a class="nav-link" href="/logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </a>
            </nav>
        </div>
    </header>

    <main style="padding: 2.5rem 1.5rem 2rem;">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="text-center text-sm text-secondary" style="padding: 2rem 0;">
        {% block footer %}T-Sync — Compare eTests{% endblock %}
    </footer>
</body>

</html>
